<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tránsitos — SuperAstro</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">✦ SuperAstro</div>
  <ul class="navbar-nav">
    <li><a href="/">Inicio</a></li>
    <li><a href="/natal">Carta Natal</a></li>
    <li><a href="/transits" class="active">Tránsitos</a></li>
    <li><a href="/horary">Horaria</a></li>
  </ul>
</nav>

<div class="container">
  <div class="grid-2">

    <!-- ── LEFT ─────────────────────────────────── -->
    <div>

      <!-- Source: carta natal -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">Carta Natal de Referencia</div>

        <!-- Option: from saved -->
        <div style="margin-bottom:16px">
          <label>Cargar carta guardada</label>
          <select id="saved-select">
            <option value="">— Selecciona una carta guardada —</option>
          </select>
        </div>

        <div style="text-align:center;color:var(--text-dim);font-size:12px;margin-bottom:12px">— o introduce datos manualmente —</div>

        <div class="form-group">
          <label>Ciudad de nacimiento</label>
          <div class="autocomplete-wrapper">
            <input type="text" id="natal-city" placeholder="Escribe la ciudad...">
            <div class="autocomplete-results" id="natal-city-results"></div>
          </div>
          <input type="hidden" id="natal-lat">
          <input type="hidden" id="natal-lon">
          <input type="hidden" id="natal-tz">
        </div>

        <div class="form-row-3">
          <div class="form-group">
            <label>Año</label>
            <input type="number" id="natal-year" placeholder="1990">
          </div>
          <div class="form-group">
            <label>Mes</label>
            <input type="number" id="natal-month" placeholder="6">
          </div>
          <div class="form-group">
            <label>Día</label>
            <input type="number" id="natal-day" placeholder="15">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Hora</label>
            <input type="number" id="natal-hour" placeholder="14">
          </div>
          <div class="form-group">
            <label>Min</label>
            <input type="number" id="natal-minute" placeholder="30">
          </div>
        </div>
      </div>

      <!-- Transit date -->
      <div class="card">
        <div class="card-title">Fecha del Tránsito</div>

        <div class="form-group">
          <label>Ciudad (para casas del tránsito)</label>
          <div class="autocomplete-wrapper">
            <input type="text" id="transit-city" placeholder="Misma que natal o diferente...">
            <div class="autocomplete-results" id="transit-city-results"></div>
          </div>
          <input type="hidden" id="transit-tz">
        </div>

        <div class="form-row-3">
          <div class="form-group">
            <label>Año</label>
            <input type="number" id="transit-year">
          </div>
          <div class="form-group">
            <label>Mes</label>
            <input type="number" id="transit-month">
          </div>
          <div class="form-group">
            <label>Día</label>
            <input type="number" id="transit-day">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Hora</label>
            <input type="number" id="transit-hour">
          </div>
          <div class="form-group">
            <label>Min</label>
            <input type="number" id="transit-minute">
          </div>
        </div>

        <button class="btn btn-secondary btn-sm" id="btn-now" style="margin-bottom:14px;width:100%">
          📅 Usar fecha y hora actuales
        </button>

        <div id="error-transit"></div>

        <button class="btn btn-primary" id="btn-calculate">
          <span id="btn-text">Calcular Tránsitos</span>
        </button>
      </div>
    </div>

    <!-- ── RIGHT ─────────────────────────────────── -->
    <div id="results-area" style="display:none">

      <!-- Chart wheel with transits -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">Rueda — Natal + Tránsitos</div>
        <div id="chart-wheel-container">
          <svg id="chart-wheel" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div style="display:flex;gap:12px;margin-top:12px;font-size:12px">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:12px;height:12px;border-radius:2px;background:rgba(167,139,250,0.4);border:1px solid #a78bfa"></div>
            <span style="color:var(--text-dim)">Planetas natales</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:12px;height:12px;border-radius:2px;background:rgba(52,211,153,0.3);border:1px solid #34d399"></div>
            <span style="color:var(--text-dim)">Planetas en tránsito</span>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="tab-t-aspects">Aspectos de Tránsito</button>
          <button class="tab-btn" data-tab="tab-t-planets">Planetas en Tránsito</button>
          <button class="tab-btn" data-tab="tab-t-natal">Posiciones Natales</button>
          <button class="tab-btn" data-tab="tab-t-interp">Interpretaciones</button>
        </div>

        <div class="tab-panel active" id="tab-t-aspects">
          <div id="transit-aspects-container"></div>
        </div>
        <div class="tab-panel" id="tab-t-planets">
          <div id="transit-planets-container"></div>
        </div>
        <div class="tab-panel" id="tab-t-natal">
          <div id="natal-planets-container"></div>
        </div>
        <div class="tab-panel" id="tab-t-interp">
          <div id="transit-interp-container"></div>
        </div>
      </div>
    </div>

    <div id="empty-area">
      <div class="card" style="text-align:center;padding:60px 24px">
        <div style="font-size:64px;margin-bottom:16px;opacity:0.3">🌍</div>
        <div style="color:var(--text-dim);font-size:15px">
          Selecciona una carta natal y una fecha<br>para ver los tránsitos activos
        </div>
      </div>
    </div>

  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>

let savedChartData = null;  // full natal chart from server

// Init city searches
initCitySearch('natal-city', 'natal-city-results', (city) => {
  document.getElementById('natal-lat').value = city.lat;
  document.getElementById('natal-lon').value = city.lon;
  document.getElementById('natal-tz').value  = city.timezone;
});
initCitySearch('transit-city', 'transit-city-results', (city) => {
  document.getElementById('transit-tz').value = city.timezone;
});
initTabs();

// Fill transit date/time now
function fillTransitNow() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('transit-year').value   = now.getFullYear();
  document.getElementById('transit-month').value  = pad(now.getMonth() + 1);
  document.getElementById('transit-day').value    = pad(now.getDate());
  document.getElementById('transit-hour').value   = pad(now.getHours());
  document.getElementById('transit-minute').value = pad(now.getMinutes());
}
fillTransitNow();
document.getElementById('btn-now').addEventListener('click', fillTransitNow);

// Load saved charts into select
async function loadSavedSelect() {
  const sel = document.getElementById('saved-select');
  try {
    const data = await API.get('/api/natal/list');
    data.charts.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = `${c.name} · ${c.birth_date}`;
      sel.appendChild(opt);
    });
  } catch(e) { console.error(e); }
}
loadSavedSelect();

document.getElementById('saved-select').addEventListener('change', async (e) => {
  const id = e.target.value;
  if (!id) { savedChartData = null; return; }
  try {
    const data = await API.get(`/api/natal/load/${id}`);
    savedChartData = data;
    // Fill natal fields from meta
    if (data.meta) {
      const [y, m, d] = data.meta.birth_date.split('-');
      const [h, min] = data.meta.birth_time.split(':');
      document.getElementById('natal-year').value   = y;
      document.getElementById('natal-month').value  = m;
      document.getElementById('natal-day').value    = d;
      document.getElementById('natal-hour').value   = h;
      document.getElementById('natal-minute').value = min;
      document.getElementById('natal-lat').value    = data.meta.lat;
      document.getElementById('natal-lon').value    = data.meta.lon;
      document.getElementById('natal-tz').value     = data.meta.timezone;
      document.getElementById('natal-city').value   = data.meta.city_name || '';
      // Mirror transit city to natal city
      document.getElementById('transit-city').value = data.meta.city_name || '';
      document.getElementById('transit-tz').value   = data.meta.timezone;
    }
  } catch(e) { alert('Error: ' + e.message); }
});

// Calculate
document.getElementById('btn-calculate').addEventListener('click', async () => {
  const btn = document.getElementById('btn-calculate');
  const btnText = document.getElementById('btn-text');
  const errEl = document.getElementById('error-transit');
  errEl.innerHTML = '';

  const natalLat = parseFloat(document.getElementById('natal-lat').value);
  const natalLon = parseFloat(document.getElementById('natal-lon').value);
  const natalTz  = document.getElementById('natal-tz').value;
  const transitTz = document.getElementById('transit-tz').value || natalTz;

  if (!natalTz || isNaN(natalLat)) {
    errEl.innerHTML = '<div class="alert alert-error">Selecciona la ciudad natal de la lista</div>';
    return;
  }

  btnText.innerHTML = '<span class="spinner"></span> Calculando...';
  btn.disabled = true;

  try {
    const payload = {
      natal_year:   parseInt(document.getElementById('natal-year').value),
      natal_month:  parseInt(document.getElementById('natal-month').value),
      natal_day:    parseInt(document.getElementById('natal-day').value),
      natal_hour:   parseInt(document.getElementById('natal-hour').value),
      natal_minute: parseInt(document.getElementById('natal-minute').value),
      natal_lat:    natalLat,
      natal_lon:    natalLon,
      natal_timezone: natalTz,
      transit_year:   parseInt(document.getElementById('transit-year').value),
      transit_month:  parseInt(document.getElementById('transit-month').value),
      transit_day:    parseInt(document.getElementById('transit-day').value),
      transit_hour:   parseInt(document.getElementById('transit-hour').value),
      transit_minute: parseInt(document.getElementById('transit-minute').value),
      transit_timezone: transitTz,
    };
    const data = await API.post('/api/transits/calculate', payload);
    renderTransitResults(data);
  } catch(e) {
    errEl.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  } finally {
    btnText.textContent = 'Calcular Tránsitos';
    btn.disabled = false;
  }
});

function renderTransitResults(data) {
  document.getElementById('empty-area').style.display = 'none';
  document.getElementById('results-area').style.display = 'block';

  // Wheel
  const svg = document.getElementById('chart-wheel');
  const natalChartForWheel = {
    planets: data.natal_planets,
    cusps: data.natal_cusps,
    ascendant: data.natal_ascendant,
    mc: data.natal_mc,
    aspects: data.natal_aspects,
  };
  const transitForWheel = { transit_planets: data.transit_planets };
  drawChartWheel(svg, natalChartForWheel, transitForWheel);

  // Transit aspects list
  const taContainer = document.getElementById('transit-aspects-container');
  if (!data.transit_aspects.length) {
    taContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✦</div><p>Sin aspectos de tránsito activos</p></div>';
  } else {
    taContainer.innerHTML = data.transit_aspects.map(ta => `
      <div class="transit-aspect-row">
        <span style="font-weight:600;min-width:70px;color:#34d399">${ta.transit_planet}</span>
        <span class="aspect-badge ${aspectClass(ta.aspect_name)}">${ta.aspect_name}</span>
        <span style="min-width:70px">${ta.natal_planet}</span>
        <span class="applying-badge ${ta.is_applying ? 'applying' : 'separating'}">
          ${ta.is_applying ? '● aplicativo' : '○ separativo'}
        </span>
        <span style="color:var(--text-dim);margin-left:auto;font-size:11px">orb ${ta.orb}°</span>
      </div>
    `).join('');
  }

  // Transit planets table
  renderPlanetTable(data.transit_planets, 'transit-planets-container', null);

  // Natal planets table
  renderPlanetTable(data.natal_planets, 'natal-planets-container', null);

  // Interpretations
  renderInterpretations(data.interpretations, 'transit-interp-container');
}
</script>
</body>
</html>
